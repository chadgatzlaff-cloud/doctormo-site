  <!-- Text -->
  <text x="200" y="155" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#2D2A26" letter-spacing="0.5">Hashimoto's</text>
  <text x="200" y="205" font-family="Georgia, serif" font-size="11" text-anchor="middle" fill="#7A9E7E" opacity="0.6">Blog Thumbnail</text>
