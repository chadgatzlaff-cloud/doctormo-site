<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Background -->
  <rect width="400" height="225" fill="#FDF6F0"/>

  <!-- Subtle gradient -->
  <defs>
    <linearGradient id="grad6" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7A9E7E;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#C4727F;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="400" height="225" fill="url(#grad6)"/>

  <!-- Geometric elements -->
  <rect x="50" y="50" width="60" height="100" fill="#C4727F" opacity="0.08" rx="6"/>
  <circle cx="200" cy="80" r="45" fill="#7A9E7E" opacity="0.08"/>
  <path d="M 280 140 L 340 100 L 360 160 Z" fill="#C4727F" opacity="0.06"/>

