<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Background -->
  <rect width="400" height="225" fill="#FDF6F0"/>

  <!-- Subtle gradient -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4727F;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7A9E7E;stop-opacity:0.1" />
