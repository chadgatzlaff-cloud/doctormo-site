<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 560" width="420" height="560">
  <!-- Background -->
  <rect width="420" height="560" fill="#FDF6F0"/>

  <!-- Subtle gradient accent -->
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4727F;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#7A9E7E;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="420" height="560" fill="url(#accentGrad)"/>

  <!-- Subtle silhouette shape (shoulders/head) -->
  <circle cx="210" cy="180" r="60" fill="#C4727F" opacity="0.15"/>
  <path d="M 120 200 Q 120 280 150 350 L 270 350 Q 300 280 300 200 Z" fill="#C4727F" opacity="0.08"/>

  <!-- Accent line -->
  <line x1="50" y1="420" x2="370" y2="420" stroke="#7A9E7E" stroke-width="2" opacity="0.3"/>

  <!-- Text -->
  <text x="210" y="470" font-family="Georgia, serif" font-size="36" font-weight="normal" text-anchor="middle" fill="#2D2A26" letter-spacing="2">Dr. Mo</text>
  <text x="210" y="510" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#C4727F" letter-spacing="1" opacity="0.8">Portrait Placeholder</text>
</svg>