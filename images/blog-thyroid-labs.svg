<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="400" height="225">
  <!-- Background -->
  <rect width="400" height="225" fill="#FDF6F0"/>

  <!-- Subtle gradient -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A9E7E;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#C4727F;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="400" height="225" fill="url(#grad4)"/>

  <!-- Accent shapes -->
  <circle cx="80" cy="60" r="40" fill="#C4727F" opacity="0.1"/>
  <path d="M 200 40 L 280 120 L 200 120 Z" fill="#7A9E7E" opacity="0.08"/>
  <rect x="280" y="120" width="80" height="80" fill="#C4727F" opacity="0.05" rx="8"/>

  <!-- Decorative line -->
