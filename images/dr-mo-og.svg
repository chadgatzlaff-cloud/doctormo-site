    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4727F;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#7A9E7E;stop-opacity:0.08" />
